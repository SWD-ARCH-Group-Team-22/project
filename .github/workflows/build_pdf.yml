name: Build PDFs from Markdown

on:
  push:
    branches:
      - '**'  
    paths:
      - "doc/analysis/md/**/*.md"
      - ".github/workflows/build-pdf.yml"
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies (Pandoc, LaTeX, Graphviz, Java)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra \
            lmodern \
            librsvg2-bin \
            graphviz \
            default-jre

      - name: Install Latest PlantUML
        run: |
          # Scarica una release stabile e recente di PlantUML
          wget https://github.com/plantuml/plantuml/releases/download/v1.2024.4/plantuml-1.2024.4.jar -O /tmp/plantuml.jar
          # Crea l'eseguibile globale "plantuml" affinché pandoc-plantuml-filter lo trovi
          echo '#!/bin/bash' | sudo tee /usr/local/bin/plantuml
          echo 'java -jar /tmp/plantuml.jar "$@"' | sudo tee -a /usr/local/bin/plantuml
          sudo chmod +x /usr/local/bin/plantuml

      - name: Install Pandoc PlantUML Filter
        run: pipx install pandoc-plantuml-filter

      - name: Create output directories
        run: |
          mkdir -p doc/deliverables
          mkdir -p res

      - name: Convert deliverables Markdown files to PDF
        run: |
          shopt -s nullglob globstar
          
          for file in doc/analysis/md/**/*.md; do
            name=$(basename "$file" .md)
            echo "Converting $file to doc/deliverables/${name}.pdf..."
            
            # Utilizzo del filtro per PlantUML
            pandoc --filter pandoc-plantuml "$file" -o "doc/deliverables/${name}.pdf"
          done

      - name: Commit generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add doc/deliverables/*.pdf || true
          git diff --cached --quiet || git commit -m "chore: update generated PDFs"
          git push

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: generated-pdfs
          path: doc/deliverables/*.pdf
          if-no-files-found: warn
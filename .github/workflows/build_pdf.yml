name: Build PDFs from Markdown

on:
  push:
    branches:
      - main
    paths:
      - "src/analysis/**/*.md"
      - "src/pandoc/**/*.yaml"
      - ".github/workflows/build-pdf.yml"
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          # Aggiunto --no-install-recommends per velocizzare leggermente l'installazione
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra \
            librsvg2-bin

      - name: Create output directories
        run: |
          mkdir -p doc/deliverables
          mkdir -p res

      - name: Convert deliverables Markdown files to PDF
        run: |
          # Evita che il loop fallisca se la cartella è momentaneamente vuota
          shopt -s nullglob
          for file in src/analysis/*.md; do
            name=$(basename "$file" .md)
            echo "Converting $file to doc/deliverables/${name}.pdf..."
            pandoc "$file" \
              --defaults=src/pandoc/pandoc-defaults.yaml \
              -o "doc/deliverables/${name}.pdf"
          done

      - name: Commit generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Aggiungi i file. Se non ci sono file PDF, ignora l'errore
          git add doc/deliverables/*.pdf res/*.pdf || true
          
          # Fai il commit solo se ci sono effettive differenze, altrimenti procedi senza errori
          git diff --cached --quiet || git commit -m "chore: update generated PDFs"
          
          # Pusha le modifiche sul branch corrente
          git push

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: generated-pdfs
          path: doc/deliverables/*.pdf
          if-no-files-found: warn
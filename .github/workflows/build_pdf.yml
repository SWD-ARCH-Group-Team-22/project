name: Build PDFs from Markdown

on:
  push:
    branches:
      - '**'  
    paths:
      - "doc/analysis/md/**/*.md"
      - ".github/workflows/build-pdf.yml"
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies (Pandoc, LaTeX, PlantUML)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra \
            lmodern \
            librsvg2-bin \
            plantuml \
            graphviz \
            default-jre

      - name: Install Pandoc PlantUML Filter
        run: pipx install pandoc-plantuml-filter

      - name: Create output directories
        run: |
          mkdir -p doc/deliverables
          mkdir -p res

      - name: Convert deliverables Markdown files to PDF
        run: |
          shopt -s nullglob globstar
          
          for file in doc/analysis/md/**/*.md; do
            name=$(basename "$file" .md)
            echo "Converting $file to doc/deliverables/${name}.pdf..."
            
            # Modificato: aggiunto --filter pandoc-plantuml
            pandoc --filter pandoc-plantuml "$file" -o "doc/deliverables/${name}.pdf"
          done

      - name: Commit generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add doc/deliverables/*.pdf || true
          git diff --cached --quiet || git commit -m "chore: update generated PDFs"
          git push

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: generated-pdfs
          path: doc/deliverables/*.pdf
          if-no-files-found: warn
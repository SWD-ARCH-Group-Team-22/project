name: C4 Model to PDF Converter

on:
  push:
    paths:
      - 'doc/architecture/**'

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Fondamentale per permettere al bot di fare il push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Usiamo un'azione specifica che ha già Graphviz e le librerie PDF incluse
      - name: Generate PDFs from PlantUML
        uses: yuzutech/plantuml-action@v1.2.4
        with:
          path: doc/architecture
          format: pdf

      - name: Organize and Clean Up
        run: |
          # Crea la cartella di destinazione
          mkdir -p doc/deliverables/C4GraphPDF
          
          # Sposta i PDF generati (l'action li crea nella stessa cartella dei sorgenti)
          # Usiamo 'cp' e poi cancelliamo per sicurezza, o 'mv' diretto
          mv doc/architecture/*.pdf doc/deliverables/C4GraphPDF/ || echo "Nessun PDF trovato"

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Aggiungiamo i file alla staging area
          git add doc/deliverables/C4GraphPDF/*.pdf
          
          # Commit solo se ci sono cambiamenti effettivi
          if git diff --staged --quiet; then
            echo "Nessuna modifica rilevata nei PDF."
          else
            git commit -m "docs: auto-generate C4 diagrams to PDF"
            git push
          fi
name: C4 Model to PDF Converter

on:
  push:
    paths:
      - 'doc/architecture/**'

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Scarica tutta la cronologia per evitare errori di push

      - name: Generate PDFs from PlantUML
        uses: yuzutech/plantuml-action@v1.5.2
        with:
          path: doc/architecture
          format: pdf

      - name: Debug and Move Files
        run: |
          echo "Checking if PDFs were generated in doc/architecture..."
          ls -R doc/architecture
          
          # Crea la cartella (assicurati che il percorso 'doc/deliverables' esista già o crealo)
          mkdir -p doc/deliverables/C4GraphPDF
          
          # Sposta i file se esistono, altrimenti non bloccare il job
          cp doc/architecture/*.pdf doc/deliverables/C4GraphPDF/ || echo "No PDF files found!"
          
          # Aggiunge un file segnaposto per forzare Git a vedere la cartella
          touch doc/deliverables/C4GraphPDF/.gitkeep

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Aggiungiamo tutto il contenuto della cartella deliverables
          git add doc/deliverables/C4GraphPDF/
          
          # Debug: controlliamo cosa sta per essere inviato
          git status
          
          if git diff --staged --quiet; then
            echo "Nothing to commit!"
          else
            git commit -m "ci(docs): sync C4 diagrams to C4GraphPDF"
            git push origin HEAD:${{ github.ref }}
          fi
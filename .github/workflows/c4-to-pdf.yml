name: C4 Model to PDF Converter

on:
  push:
    paths:
      - 'doc/architecture/**'

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Utilizza un container pre-configurato con Graphviz e tutte le librerie PDF
      - name: Generate PDFs from PlantUML
        uses: yuzutech/plantuml-action@v1.5.2
        with:
          path: doc/architecture
          format: pdf

      - name: Move PDFs to target folder
        run: |
          # Create the target directory
          mkdir -p doc/deliverables/C4GraphPDF
          
          # The action creates PDFs in the same folder as the source files. 
          # We move them to our deliverables folder.
          mv doc/architecture/*.pdf doc/deliverables/C4GraphPDF/

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add doc/deliverables/C4GraphPDF/*.pdf
          
          if git diff --staged --quiet; then
            echo "No changes detected in PDFs. Skipping commit."
          else
            git commit -m "ci(docs): auto-generate C4 pdfs using plantuml-action"
            git push
          fi
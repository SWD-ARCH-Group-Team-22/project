name: C4 Model to PDF

on:
  push:
    paths:
      - 'doc/c4/**'

jobs:
  convert_c4:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # graphviz serve per il comando 'dot'
          # librsvg2-bin serve per convertire SVG in PDF in modo pulito
          sudo apt-get install -y graphviz librsvg2-bin

      - name: Download PlantUML
        run: |
          wget https://github.com/plantuml/plantuml/releases/download/v1.2024.3/plantuml-1.2024.3.jar -O plantuml.jar

      - name: Generate PDFs
        run: |
          mkdir -p doc/deliverables/c4Pdf
          
          # 1. Generiamo i file in formato SVG (molto più stabile del PDF diretto in Java)
          java -jar plantuml.jar -tsvg "doc/c4/**" -o "../deliverables/c4Pdf"
          
          # 2. Convertiamo ogni SVG in PDF usando rsvg-convert
          # Questo risolve il problema delle classi Java mancanti
          for f in doc/deliverables/c4Pdf/*.svg; do
            rsvg-convert -f pdf -o "${f%.svg}.pdf" "$f"
            rm "$f" # Rimuoviamo l'SVG temporaneo
          done

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update C4 diagrams in deliverables/c4Pdf"
          file_pattern: 'doc/deliverables/c4Pdf/*.pdf'
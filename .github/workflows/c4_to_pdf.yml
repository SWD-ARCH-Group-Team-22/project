name: C4 Model to PDF

on:
  push:
    paths:
      - 'doc/c4/**'
  workflow_dispatch:

jobs:
  convert_c4:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        # Questo step risolve l'errore "Cannot run program dot" e la mancanza di librerie PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz librsvg2-bin

      - name: Download PlantUML
        run: |
          wget https://github.com/plantuml/plantuml/releases/download/v1.2024.3/plantuml-1.2024.3.jar -O plantuml.jar

      - name: Generate PDFs
        run: |
          mkdir -p doc/deliverables/c4Pdf
          
          # 1. Generiamo SVG invece di PDF per evitare errori di librerie Java mancanti
          java -jar plantuml.jar -tsvg "doc/c4/**.puml" -o "../deliverables/c4Pdf"
          
          # 2. Convertiamo gli SVG in PDF usando rsvg-convert (molto più affidabile)
          shopt -s nullglob
          for f in doc/deliverables/c4Pdf/*.svg; do
            echo "Converting $f to PDF..."
            rsvg-convert -f pdf -o "${f%.svg}.pdf" "$f"
            rm "$f"
          done

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update C4 diagrams to PDF"
          file_pattern: 'doc/deliverables/c4Pdf/*.pdf'
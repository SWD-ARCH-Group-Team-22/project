name: Diagrams Conversion 

on:
  push:
    paths:
      - 'doc/charts/puml/**'
      - 'doc/charts/C4/**'
  workflow_dispatch:

jobs:
  convert_diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java for PlantUML
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz librsvg2-bin

      - name: Download PlantUML
        run: |
          wget https://github.com/plantuml/plantuml/releases/download/v1.2024.3/plantuml-1.2024.3.jar -O plantuml.jar

      - name: Export LikeC4 to PlantUML format
        run: |
          mkdir -p doc/deliverables/C4
          npx --yes likec4@latest codegen plantuml doc/charts/C4 -o doc/deliverables/C4

      - name: Generate SVG via PlantUML
        run: |
          mkdir -p doc/deliverables/puml
          
          # 1. Generate SVG from standard PlantUML diagrams
          find doc/charts/puml -name "*.puml" -print -exec java -jar plantuml.jar -tsvg {} -o "$GITHUB_WORKSPACE/doc/deliverables/puml" \;
          
          # 2. Generate SVG from LikeC4-generated PlantUML files
          find doc/deliverables/C4 -name "*.puml" -print -exec java -jar plantuml.jar -tsvg {} \;

      - name: Convert SVGs to PDF and Cleanup intermediate files
        run: |
          shopt -s globstar
          shopt -s nullglob
          
          # Convert all SVG files to PDF
          for f in doc/deliverables/**/*.svg; do
            echo "Converting $f to PDF..."
            rsvg-convert -f pdf -o "${f%.svg}.pdf" "$f"
          done
          
          # Remove temporary LikeC4-generated PlantUML files
          for f in doc/deliverables/C4/**/*.puml; do
            rm "$f"
          done

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: automatic export of diagrams (SVG & PDF via PlantUML)"
          file_pattern: 'doc/deliverables/**/*.pdf doc/deliverables/**/*.svg'
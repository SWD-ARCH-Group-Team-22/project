name: Diagrams Conversion 

on:
  push:
    paths:
      - 'doc/charts/puml/**'
      - 'doc/charts/C4/**'
  workflow_dispatch:

jobs:
  convert_diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (per PlantUML)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js (LikeC4 richiede Node 22+)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz librsvg2-bin imagemagick

      - name: Download PlantUML
        run: |
          wget https://github.com/plantuml/plantuml/releases/download/v1.2024.3/plantuml-1.2024.3.jar -O plantuml.jar

      - name: Generate PlantUML Diagrams (SVG → PDF)
        run: |
          mkdir -p doc/deliverables/puml
          java -jar plantuml.jar -tsvg "doc/charts/puml/**/*.puml" -o "doc/deliverables/puml" || true

      - name: Install Playwright Browsers (obbligatorio per LikeC4)
        run: |
          npx --yes --package likec4 playwright install chromium --with-deps

      - name: Export C4 Diagrams with LikeC4 (PNG)
        run: |
          mkdir -p doc/deliverables/C4
          npx --yes likec4@latest export png doc/charts/C4 -o doc/deliverables/C4 --theme light

      - name: Convert Diagrams to PDF and Cleanup PNG/SVG
        run: |
          shopt -s globstar
          shopt -s nullglob
          
          # SVG (PlantUML) → PDF + Rimozione SVG
          for f in doc/deliverables/puml/**/*.svg; do
            echo "Converting $f to PDF..."
            rsvg-convert -f pdf -o "${f%.svg}.pdf" "$f"
            rm "$f"  # Rimuove il file SVG originale
          done
          
          # PNG (LikeC4) → PDF + Rimozione PNG
          for f in doc/deliverables/C4/**/*.png; do
            echo "Converting $f to PDF..."
            convert "$f" "${f%.png}.pdf"
            rm "$f"  # Rimuove il file PNG originale
          done

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: automatic export of diagrams to PDF (cleanup intermediate PNG/SVG)"
          # Ora includiamo solo i PDF nel pattern dei file da committare
          file_pattern: 'doc/deliverables/**/*.pdf'
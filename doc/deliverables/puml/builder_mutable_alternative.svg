 textLength="195" x="13" y="217.5889">-attributeList : List&lt;Integer&gt;</text><line style="stroke:#181818;stroke-width:0.5;" x1="8" x2="718" y1="224.8906" y2="224.8906"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="700" x="13" y="241.8857">+Dependencies(elements : List&lt;Element&gt;, attributeList : List&lt;Integer&gt;, isNodeContained : boolean)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="332" x="13" y="258.1826">+setElements(elements : List&lt;Element&gt;) : void</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="357" x="13" y="274.4795">+setAttributeList(attributeList : List&lt;Integer&gt;) : void</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="331" x="13" y="290.7764">+setNodeContained(contained : boolean) : void</text></g><!--class ScriptEngine--><g id="elem_ScriptEngine"><rect codeLine="16" fill="#F1F1F1" height="48" id="ScriptEngine" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="119" x="303.5" y="44.2969"/><ellipse cx="318.5" cy="60.2969" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1.0;"/><path d="M321.4688,65.9375 Q320.8906,66.2344 320.25,66.375 Q319.6094,66.5313 318.9063,66.5313 Q316.4063,66.5313 315.0781,64.8906 Q313.7656,63.2344 313.7656,60.1094 Q313.7656,56.9844 315.0781,55.3281 Q316.4063,53.6719 318.9063,53.6719 Q319.6094,53.6719 320.25,53.8281 Q320.9063,53.9844 321.4688,54.2813 L321.4688,57 Q320.8438,56.4219 320.25,56.1563 Q319.6563,55.875 319.0313,55.875 Q317.6875,55.875 317,56.9531 Q316.3125,58.0156 316.3125,60.1094 Q316.3125,62.2031 317,63.2813 Q317.6875,64.3438 319.0313,64.3438 Q319.6563,64.3438 320.25,64.0781 Q320.8438,63.7969 321.4688,63.2188 L321.4688,65.9375 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87" x="332.5" y="65.1436">ScriptEngine</text><line style="stroke:#181818;stroke-width:0.5;" x1="304.5" x2="421.5" y1="76.2969" y2="76.2969"/><line style="stroke:#181818;stroke-width:0.5;" x1="304.5" x2="421.5" y1="84.2969" y2="84.2969"/></g><g id="elem_GMN5"><path d="M754,182.2969 L754,221.2969 L719.3,225.2969 L754,229.2969 L754,267.9609 A0,0 0 0 0 754,267.9609 L1062,267.9609 A0,0 0 0 0 1062,267.9609 L1062,192.2969 L1052,182.2969 L754,182.2969 A0,0 0 0 0 754,182.2969 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1052,182.2969 L1052,192.2969 L1062,192.2969 L1052,182.2969 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256" x="760" y="199.3638">Without a Builder, the object would need</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232" x="760" y="214.4966">a large constructor or public setters.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="760" y="229.6294">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287" x="760" y="244.7622">This can lead to incomplete or unsafe states,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="233" x="760" y="259.895">especially when the object is shared.</text></g><!--link ScriptEngine to Dependencies--><g id="link_ScriptEngine_Dependencies"><path codeLine="19" d="M363,92.4869 C363,108.5669 363,124.6169 363,146.1369 " fill="none" id="ScriptEngine-to-Dependencies" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="363,152.1369,367,143.1369,363,147.1369,359,143.1369,363,152.1369" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134" x="228" y="118.3738">creates and mutates</text></g><!--SRC=[